volumes:
  n8n_storage:

networks:
  ai-stack:
    external: true

x-n8n-env: &n8n-env
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_USER: ${POSTGRES_USER}
  DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_PERSONALIZATION_ENABLED: "false"
  N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
  N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
  OLLAMA_HOST: ${OLLAMA_HOST:-ollama:11434}

services:
  n8n-import:
    image: n8nio/n8n:latest
    hostname: n8n-import
    container_name: n8n-import
    networks: ['ai-stack']
    env_file:
      - .env
    environment:
      <<: *n8n-env
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        if [ -z "$(n8n list:workflow --onlyId)" ]; then
          n8n import:credentials --separate --input=/demo-data/credentials && \
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows exist, skipping import"
        fi
    depends_on:
      - postgres
    volumes:
      - ./demo-data:/demo-data

  n8n:
    image: n8nio/n8n:latest
    hostname: n8n
    container_name: n8n
    networks: ['ai-stack']
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      <<: *n8n-env
      # External task runner — isolates Code node execution from the core process
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./demo-data:/demo-data
      - ./shared:/data/shared
    depends_on:
      - n8n-import

  # Hardened task runner sidecar (executes Code node JavaScript)
  # - distroless image: minimal attack surface, no shell or package manager
  # - nobody user (65532): no root privileges
  # - read_only filesystem: prevents runtime file modifications
  # - /tmp tmpfs: minimal writable scratch space
  n8n-task-runner:
    image: n8nio/n8n:latest-distroless
    container_name: n8n-task-runner
    networks: ['ai-stack']
    restart: unless-stopped
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    command: ["task-runner"]
    env_file:
      - .env
    environment:
      N8N_RUNNERS_SERVER_URI: http://n8n:5680
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
    depends_on:
      - n8n
