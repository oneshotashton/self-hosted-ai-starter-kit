# Shared network for all ai-stack services.
# Each service lives in its own subfolder with its own docker-compose.yml.
#
# Startup order:
#   1. docker compose up -d                        (creates the network)
#   2. cd postgres  && docker compose up -d
#   3. cd ollama    && docker compose --profile <cpu|gpu-nvidia|gpu-amd> up -d  # choose profile based on your hardware
#   4. cd qdrant    && docker compose up -d
#   5. cd n8n       && docker compose up -d
#
# Services:
#   postgres/   — PostgreSQL 16 database
#   ollama/     — Ollama LLM server (cpu / gpu-nvidia / gpu-amd profiles)
#   qdrant/     — Qdrant vector database
#   n8n/        — n8n automation + hardened task-runner sidecar

networks:
  ai-stack:
    name: ai-stack
    driver: bridge
